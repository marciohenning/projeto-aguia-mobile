name: Projeto Águia V36

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Verificar Expo
        run: npx expo --version

      - name: Verificar TypeScript
        run: npx tsc --noEmit
